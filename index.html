<!doctype html>
<html lang="es">
  <head>
    <script>
      (function() {
        try {
          var currentFetch = window.fetch;
          
          function tryDefine(obj, prop, descriptor) {
            try {
              Object.defineProperty(obj, prop, descriptor);
              return true;
            } catch (e) {
              return false;
            }
          }
          
          if (!currentFetch && typeof Window !== 'undefined' && Window.prototype) {
            var desc = Object.getOwnPropertyDescriptor(Window.prototype, 'fetch');
            if (desc && desc.get) {
              currentFetch = desc.get.call(window);
            }
          }
          if (!currentFetch) {
            currentFetch = window.fetch || function() { return Promise.reject("Fetch unavailable"); };
          }
          
          var descriptor = {
            get: function() { return currentFetch; },
            set: function(val) { currentFetch = val; },
            configurable: true,
            enumerable: true
          };

          try {
            delete window.fetch;
          } catch(e) {}
          tryDefine(window, 'fetch', descriptor);
          
          if (typeof Window !== 'undefined' && Window.prototype) {
            try {
              delete Window.prototype.fetch;
            } catch(e) {}
            tryDefine(Window.prototype, 'fetch', descriptor);
          }
          
          if (typeof globalThis !== 'undefined') {
            try {
              delete globalThis.fetch;
            } catch(e) {}
            tryDefine(globalThis, 'fetch', descriptor);
          }
          if (typeof self !== 'undefined') {
            try {
              delete self.fetch;
            } catch(e) {}
            tryDefine(self, 'fetch', descriptor);
          }

          // Pre-emptive localStorage and sessionStorage safety check & polyfill
          var storageTestOk = false;
          try {
            if (typeof window !== 'undefined' && window.localStorage) {
              window.localStorage.setItem('__aistudio_test_ls_key__', '1');
              window.localStorage.removeItem('__aistudio_test_ls_key__');
              storageTestOk = true;
            }
          } catch (storageError) {
            console.warn("Storage access denied. Implementing in-memory fallback:", storageError);
          }

          if (!storageTestOk) {
            function createMemStorage() {
              var store = {};
              return {
                getItem: function(key) {
                  return Object.prototype.hasOwnProperty.call(store, key) ? store[key] : null;
                },
                setItem: function(key, val) {
                  store[key] = String(val);
                },
                removeItem: function(key) {
                  delete store[key];
                },
                clear: function() {
                  store = {};
                },
                key: function(idx) {
                  var keys = Object.keys(store);
                  return keys[idx] || null;
                },
                get length() {
                  return Object.keys(store).length;
                }
              };
            }

            var memLocalStorage = createMemStorage();
            var memSessionStorage = createMemStorage();

            tryDefine(window, 'localStorage', {
              get: function() { return memLocalStorage; },
              configurable: true,
              enumerable: true
            });
            tryDefine(window, 'sessionStorage', {
              get: function() { return memSessionStorage; },
              configurable: true,
              enumerable: true
            });

            if (typeof Window !== 'undefined' && Window.prototype) {
              tryDefine(Window.prototype, 'localStorage', {
                get: function() { return memLocalStorage; },
                configurable: true,
                enumerable: true
              });
              tryDefine(Window.prototype, 'sessionStorage', {
                get: function() { return memSessionStorage; },
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (globalError) {
          console.warn("Global catch in fetch patch:", globalError);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Althera Solutions | Panel de Control</title>
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
